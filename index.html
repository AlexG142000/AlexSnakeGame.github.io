<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Snake That Seduced Eve</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
            font-family: 'Courier New', monospace;
            color: #00ff00;
            overflow: hidden;
        }

        .container {
            width: 80vw;
            max-width: 1100px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            background: #000000;
            border: 4px solid #00ff00;
            box-shadow: 0 0 16px #00ff00, inset 0 0 14px rgba(0, 255, 0, 0.1);
            padding: 18px;
            border-radius: 8px;
        }

        h1 {
            font-size: clamp(1.6rem, 3.5vw, 3rem);
            text-align: center;
            text-shadow: 0 0 10px #00ff00, 0 0 16px #00ff00;
            letter-spacing: 3px;
            line-height: 1.1;
        }

        .scorecard {
            width: 70%;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 1.05em;
        }

        .score-item {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #ff00ff;
            padding: 12px 16px;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 8px #ff00ff;
        }

        .score-label {
            font-size: clamp(0.65rem, 1vw, 0.9rem);
            color: #00ffff;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            white-space: nowrap;
        }

        .score-value {
            font-size: clamp(1.3rem, 2.2vw, 1.9rem);
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 5px #ffff00;
        }

        #gameCanvas {
            width: 80%;
            max-width: 960px;
            max-height: 520px;
            flex: 1;
            min-height: 0;
            border: 3px solid #00ff00;
            background: #1a1a1a;
            box-shadow: 0 0 14px rgba(0, 255, 0, 0.45);
            image-rendering: pixelated;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 22px;
            justify-content: center;
            align-items: center;
            margin-top: 4px;
            margin-bottom: 2px;
            flex-wrap: wrap;
        }

        button {
            padding: 11px 30px;
            font-size: clamp(0.85rem, 1.1vw, 1rem);
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: #000000;
            border: 2px solid #ffff00;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 8px #ff00ff;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }

        button:hover {
            background: linear-gradient(135deg, #ffff00, #ff00ff);
            box-shadow: 0 0 14px #ffff00;
            transform: scale(1.03);
        }

        button:active {
            transform: scale(0.96);
        }

        .game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .game-over-screen.active {
            display: flex;
        }

        .game-over-content {
            width: 80vw;
            max-width: 1100px;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            text-align: center;
            border: 4px solid #00ff00;
            padding: 34px;
            background: rgba(0, 0, 0, 0.98);
            box-shadow: 0 0 24px #00ff00, inset 0 0 16px rgba(0, 255, 0, 0.1);
        }

        .game-over-content h2 {
            font-size: clamp(2rem, 4.5vw, 4.5rem);
            color: #00ff00;
            text-shadow: 0 0 16px #00ff00;
            letter-spacing: 4px;
            line-height: 1.1;
        }

        .final-score {
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            color: #ffff00;
            text-shadow: 0 0 7px #ffff00;
        }

        .philosophy-quote {
            width: 90%;
            max-width: 900px;
            font-size: clamp(0.95rem, 2vw, 1.9rem);
            color: #00ffff;
            font-style: italic;
            padding: 20px;
            border-left: 5px solid #00ffff;
            background: rgba(0, 255, 255, 0.12);
            line-height: 1.35;
            text-shadow: 0 0 8px #00ffff;
            overflow-wrap: break-word;
            max-height: 38vh;
            overflow-y: auto;
        }

        @media (max-width: 900px) {
            body {
                overflow-y: auto;
            }

            .container {
                width: 95vw;
                height: 95vh;
                padding: 14px;
            }

            .scorecard {
                width: 90%;
                flex-direction: column;
                gap: 10px;
            }

            .score-item {
                min-width: unset;
                width: 100%;
            }

            #gameCanvas {
                width: 95%;
                max-height: 460px;
            }

            .game-over-content {
                width: 95vw;
                min-height: 85vh;
                padding: 22px;
            }

            .philosophy-quote {
                width: 95%;
                font-size: clamp(0.85rem, 3.4vw, 1.25rem);
                padding: 16px;
                max-height: 32vh;
                overflow-y: auto;
            }
        }
    </style>
</head>

<body>
    <audio id="eatSFX" src="eat.mp3" preload="auto"></audio>
    <audio id="gameOverSFX" src="gameover.mp3" preload="auto"></audio>

    <div class="container">
        <h1>THE SNAKE THAT SEDUCED EVE</h1>

        <div class="scorecard">
            <div class="score-item">
                <div class="score-label">Forbidden Fruits Eaten</div>
                <div class="score-value" id="score">0</div>
            </div>

            <div class="score-item">
                <div class="score-label">Most Original Sins Committed</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="button-group">
            <button onclick="startGame()">EAT NOW</button>
            <button onclick="resetGame()">RAPTURE</button>
        </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-content">
            <h2>GOD CASTS YOU OUT OF EDEN</h2>
            <p class="final-score">FORBIDDEN FRUITS EATEN: <span id="finalScore">0</span></p>
            <div class="philosophy-quote" id="philosophyQuote"></div>
            <button onclick="startGame()">START A NEW EDEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');

        const eatSFX = document.getElementById('eatSFX');
        const gameOverSFX = document.getElementById('gameOverSFX');

        const gridSize = 20;

        const startSpeed = 110;
        const minSpeed = 60;
        const speedStep = 8;
        const fruitsPerSpeedUp = 5;

        let tileCountX = 40;
        let tileCountY = 25;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };

        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };

        let score = 0;
        let highScore = Number(localStorage.getItem('snakeHighScore')) || 0;

        let gameRunning = false;
        let gamePaused = false;
        let gameStarted = false;

        let gameSpeed = startSpeed;
        let gameTimer = null;

        let gridCanvas = document.createElement('canvas');
        let gridCtx = gridCanvas.getContext('2d', { alpha: false });

        const philosophyQuotes = [
            '"BOOM TARAT-TARAT." — WILLIE REVILLAME',
            '"PAG HINDI AKO PAPASOK, HINAHANAP NIYO AKO, DIBA? NGAYON PAPASOK AKO, TATANUNGIN N\'YO AKO BAKIT AKO PUMASOK?" — BATO DELA ROSA',
            '"WALANG HIMALA!" — NORA AUNOR',
            '"I DON’T CARE." — KRIS AQUINO',
            '"LOVE LOVE LOVE!" — KRIS AQUINO',
            '"DO NOT TOUCH MY COUNTRYMAN." — ROBIN PADILLA',
            '"I DO NOT CARE ABOUT HUMAN RIGHTS, I CARE ABOUT HUMAN LIVES." — RODRIGO DUTERTE',

            '"HELL IS OTHER PEOPLE." — JEAN-PAUL SARTRE',
            '"MAN IS CONDEMNED TO BE FREE." — JEAN-PAUL SARTRE',
            '"GOD IS DEAD. GOD REMAINS DEAD. AND WE HAVE KILLED HIM." — FRIEDRICH NIETZSCHE',
            '"HE WHO HAS A WHY TO LIVE CAN BEAR ALMOST ANY HOW." — FRIEDRICH NIETZSCHE',
            '"THE UNEXAMINED LIFE IS NOT WORTH LIVING." — SOCRATES',
            '"ANXIETY IS THE DIZZINESS OF FREEDOM." — SØREN KIERKEGAARD',
            '"NO MAN EVER STEPS IN THE SAME RIVER TWICE." — HERACLITUS',
            '"THE STRUGGLE ITSELF TOWARD THE HEIGHTS IS ENOUGH TO FILL A MAN’S HEART." — ALBERT CAMUS',

            '"IN THE DAY THAT YOU EAT FROM IT YOU WILL CERTAINLY DIE." — GENESIS 2:17',
            '"THE SERPENT DECEIVED ME, AND I ATE." — GENESIS 3:13',
            '"DUST YOU ARE AND TO DUST YOU WILL RETURN." — GENESIS 3:19',
            '"SIN IS CROUCHING AT YOUR DOOR." — GENESIS 4:7',
            '"VANITY OF VANITIES; ALL IS VANITY." — ECCLESIASTES 1:2',
            '"THE WAGES OF SIN IS DEATH." — ROMANS 6:23',
            '"LET THE DEAD BURY THEIR DEAD." — MATTHEW 8:22',
        ];

        const colors = {
            snake: '#00ff00',
            snakeHead: '#ffff00',
            food: '#ff00ff',
            background: '#1a1a1a',
            grid: '#003300'
        };

        eatSFX.volume = 0.45;
        gameOverSFX.volume = 0.55;

        highScoreDisplay.textContent = highScore;

        function getRandomQuote() {
            return philosophyQuotes[Math.floor(Math.random() * philosophyQuotes.length)];
        }

        function playSound(sound) {
            try {
                sound.pause();
                sound.currentTime = 0;

                const playPromise = sound.play();

                if (playPromise !== undefined) {
                    playPromise.catch(() => {});
                }
            } catch (error) {}
        }

        function playCrunchSound() {
            playSound(eatSFX);
        }

        function playExplosionSound() {
            playSound(gameOverSFX);
        }

        function clearGameTimer() {
            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;
            }
        }

        function startGameTimer() {
            clearGameTimer();

            gameTimer = setInterval(() => {
                if (!gameRunning || gamePaused || !gameStarted) return;

                update();
                draw();
            }, gameSpeed);
        }

        function restartGameTimerWithNewSpeed() {
            if (gameRunning && gameStarted && !gamePaused) {
                startGameTimer();
            }
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();

            const rawWidth = Math.floor(rect.width / gridSize) * gridSize;
            const rawHeight = Math.floor(rect.height / gridSize) * gridSize;

            canvas.width = Math.max(rawWidth, 400);
            canvas.height = Math.max(rawHeight, 300);

            tileCountX = canvas.width / gridSize;
            tileCountY = canvas.height / gridSize;

            buildGridCanvas();
            draw();
        }

        window.addEventListener('resize', () => {
            clearGameTimer();
            resizeCanvas();

            if (gameRunning && gameStarted && !gamePaused) {
                startGameTimer();
            }
        });

        function buildGridCanvas() {
            gridCanvas.width = canvas.width;
            gridCanvas.height = canvas.height;

            gridCtx.fillStyle = colors.background;
            gridCtx.fillRect(0, 0, gridCanvas.width, gridCanvas.height);

            gridCtx.strokeStyle = colors.grid;
            gridCtx.lineWidth = 0.5;

            gridCtx.beginPath();

            for (let x = 0; x <= tileCountX; x++) {
                const px = x * gridSize + 0.5;
                gridCtx.moveTo(px, 0);
                gridCtx.lineTo(px, gridCanvas.height);
            }

            for (let y = 0; y <= tileCountY; y++) {
                const py = y * gridSize + 0.5;
                gridCtx.moveTo(0, py);
                gridCtx.lineTo(gridCanvas.width, py);
            }

            gridCtx.stroke();
        }

        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            const key = e.key.toUpperCase();

            const isDirectionKey =
                key === 'ARROWUP' ||
                key === 'W' ||
                key === 'ARROWDOWN' ||
                key === 'S' ||
                key === 'ARROWLEFT' ||
                key === 'A' ||
                key === 'ARROWRIGHT' ||
                key === 'D';

            if (!gameStarted && gameRunning && isDirectionKey) {
                gameStarted = true;
                startGameTimer();
            }

            switch (key) {
                case 'ARROWUP':
                case 'W':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;

                case 'ARROWDOWN':
                case 'S':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;

                case 'ARROWLEFT':
                case 'A':
                    if (direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;

                case 'ARROWRIGHT':
                case 'D':
                    if (direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;

                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        }

        function togglePause() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;

            if (gamePaused) {
                clearGameTimer();
            } else if (gameStarted) {
                startGameTimer();
            }

            draw();
        }

        function startGame() {
            clearGameTimer();

            snake = [{
                x: Math.floor(tileCountX / 2),
                y: Math.floor(tileCountY / 2)
            }];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            score = 0;
            gameSpeed = startSpeed;

            generateFood();
            updateDisplay();

            gameRunning = true;
            gamePaused = false;
            gameStarted = false;

            gameOverScreen.classList.remove('active');

            draw();
        }

        function resetGame() {
            clearGameTimer();

            snake = [{
                x: Math.floor(tileCountX / 2),
                y: Math.floor(tileCountY / 2)
            }];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            score = 0;
            gameSpeed = startSpeed;

            gameRunning = false;
            gamePaused = false;
            gameStarted = false;

            generateFood();
            updateDisplay();

            gameOverScreen.classList.remove('active');

            draw();
        }

        function generateFood() {
            let newX;
            let newY;
            let validPosition = false;

            while (!validPosition) {
                newX = Math.floor(Math.random() * tileCountX);
                newY = Math.floor(Math.random() * tileCountY);

                validPosition = true;

                for (let i = 0; i < snake.length; i++) {
                    if (snake[i].x === newX && snake[i].y === newY) {
                        validPosition = false;
                        break;
                    }
                }
            }

            food.x = newX;
            food.y = newY;
        }

        function update() {
            direction = nextDirection;

            const headX = snake[0].x + direction.x;
            const headY = snake[0].y + direction.y;

            if (
                headX < 0 ||
                headX >= tileCountX ||
                headY < 0 ||
                headY >= tileCountY
            ) {
                endGame();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === headX && snake[i].y === headY) {
                    endGame();
                    return;
                }
            }

            snake.unshift({ x: headX, y: headY });

            if (headX === food.x && headY === food.y) {
                score += 1;

                playCrunchSound();

                if (score % fruitsPerSpeedUp === 0) {
                    gameSpeed = Math.max(minSpeed, gameSpeed - speedStep);
                    restartGameTimerWithNewSpeed();
                }

                generateFood();
            } else {
                snake.pop();
            }

            updateDisplay();
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            highScoreDisplay.textContent = highScore;
        }

        function draw() {
            ctx.drawImage(gridCanvas, 0, 0);

            for (let i = snake.length - 1; i >= 0; i--) {
                const segment = snake[i];

                if (i === 0) {
                    ctx.fillStyle = colors.snakeHead;
                } else {
                    ctx.fillStyle = colors.snake;
                }

                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            }

            ctx.fillStyle = colors.food;

            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            if (!gameStarted && gameRunning) {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.85)';
                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.fillText(
                    'PRESS ANY ARROW KEY TO BEGIN TEMPTATION',
                    canvas.width / 2,
                    canvas.height / 2
                );
            }

            if (gamePaused) {
                ctx.fillStyle = 'rgba(255, 0, 255, 0.75)';
                ctx.font = 'bold 42px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.fillText(
                    'PAUSED',
                    canvas.width / 2,
                    canvas.height / 2
                );
            }
        }

        function endGame() {
            clearGameTimer();

            gameRunning = false;
            gameStarted = false;

            playExplosionSound();

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }

            updateDisplay();

            document.getElementById('finalScore').textContent = score;
            document.getElementById('philosophyQuote').textContent = getRandomQuote();

            gameOverScreen.classList.add('active');
        }

        resizeCanvas();
        resetGame();
    </script>
</body>
</html>
