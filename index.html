<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Snake That Seduced Eve</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
            font-family: 'Courier New', monospace;
            color: #00ff00;
            overflow: hidden;
        }

        .container {
            width: 80vw;
            max-width: 1200px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            background: #000000;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px #00ff00, inset 0 0 20px rgba(0, 255, 0, 0.1);
            padding: 20px;
            border-radius: 8px;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 3.2rem);
            text-align: center;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            letter-spacing: 3px;
            animation: flicker 0.15s infinite;
            line-height: 1.1;
        }

        @keyframes flicker {
            0%, 100% {
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            }

            50% {
                text-shadow: 0 0 5px #00ff00;
            }
        }

        .scorecard {
            width: 70%;
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 1.1em;
        }

        .score-item {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #ff00ff;
            padding: 14px 18px;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 10px #ff00ff;
        }

        .score-label {
            font-size: clamp(0.65rem, 1.1vw, 0.95rem);
            color: #00ffff;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            white-space: nowrap;
        }

        .score-value {
            font-size: clamp(1.3rem, 2.4vw, 2rem);
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 5px #ffff00;
        }

        #gameCanvas {
            width: 80%;
            flex: 1;
            min-height: 0;
            border: 3px solid #00ff00;
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            image-rendering: pixelated;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 24px;
            justify-content: center;
            align-items: center;
            margin-top: 6px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 32px;
            font-size: clamp(0.85rem, 1.2vw, 1.1rem);
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            color: #000000;
            border: 2px solid #ffff00;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px #ff00ff;
            transition: all 0.3s;
        }

        button:hover {
            background: linear-gradient(135deg, #ffff00, #ff00ff);
            box-shadow: 0 0 20px #ffff00;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .game-over-screen.active {
            display: flex;
        }

        .game-over-content {
            width: 80vw;
            max-width: 1200px;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            text-align: center;
            border: 4px solid #00ff00;
            padding: 40px;
            background: rgba(0, 0, 0, 0.98);
            box-shadow: 0 0 30px #00ff00, inset 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .game-over-content h2 {
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            letter-spacing: 4px;
            line-height: 1.1;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }
        }

        .final-score {
            font-size: clamp(1rem, 2vw, 1.8rem);
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
        }

        .philosophy-quote {
            width: 90%;
            max-width: 950px;
            font-size: clamp(2rem, 4.2vw, 4.5rem);
            color: #00ffff;
            font-style: italic;
            padding: 30px;
            border-left: 5px solid #00ffff;
            background: rgba(0, 255, 255, 0.12);
            line-height: 1.25;
            text-shadow: 0 0 14px #00ffff;
        }

        @media (max-width: 900px) {
            body {
                overflow-y: auto;
            }

            .container {
                width: 95vw;
                height: 95vh;
                padding: 14px;
            }

            .scorecard {
                width: 90%;
                flex-direction: column;
                gap: 10px;
            }

            .score-item {
                min-width: unset;
                width: 100%;
            }

            #gameCanvas {
                width: 95%;
            }

            .game-over-content {
                width: 95vw;
                min-height: 85vh;
                padding: 24px;
            }

            .philosophy-quote {
                width: 95%;
                font-size: clamp(1.5rem, 5vw, 2.8rem);
                padding: 22px;
            }
        }
    </style>
</head>

<body>

    <audio id="moveSFX" src="move.mp3" preload="auto"></audio>
    <audio id="eatSFX" src="eat.mp3" preload="auto"></audio>
    <audio id="gameOverSFX" src="gameover.mp3" preload="auto"></audio>

    <div class="container">
        <h1>THE SNAKE THAT SEDUCED EVE</h1>

        <div class="scorecard">
            <div class="score-item">
                <div class="score-label">Forbidden Fruits Eaten</div>
                <div class="score-value" id="score">0</div>
            </div>

            <div class="score-item">
                <div class="score-label">Most Original Sins Committed</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="button-group">
            <button onclick="startGame()">EAT NOW</button>
            <button onclick="resetGame()">RAPTURE</button>
        </div>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-content">
            <h2>GOD CASTS YOU OUT OF EDEN</h2>
            <p class="final-score">FORBIDDEN FRUITS EATEN: <span id="finalScore">0</span></p>
            <div class="philosophy-quote" id="philosophyQuote"></div>
            <button onclick="startGame()">START A NEW EDEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOverScreen');

        const moveSFX = document.getElementById('moveSFX');
        const eatSFX = document.getElementById('eatSFX');
        const gameOverSFX = document.getElementById('gameOverSFX');

        const gridSize = 20;

        let tileCountX = 40;
        let tileCountY = 25;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };

        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };

        let score = 0;

        let gameRunning = false;
        let gamePaused = false;
        let gameStarted = false;

        let highScore = Number(localStorage.getItem('snakeHighScore')) || 0;

        let gameSpeed = 100;
        let lastMoveTime = 0;

        let sfxEnabled = true;

        const philosophyQuotes = [
            '"BOOM TARAT-TARAT." — WILLIE REVILLAME',
            '"PAG HINDI AKO PAPASOK, HINAHANAP NIYO AKO, DIBA? NGAYON PAPASOK AKO, TATANUNGIN N\'YO AKO BAKIT AKO PUMASOK?" — BATO DELA ROSA',
            '"WALANG HIMALA!" — NORA AUNOR',
            '"I DON’T CARE." — KRIS AQUINO',
            '"LOVE LOVE LOVE!" — KRIS AQUINO',
            '"SINONG MAY SALA? SINONG DAPAT SISIHIN?" — MIRIAM DEFENSOR SANTIAGO',
            '"ANG KABATAAN ANG PAG-ASA NG BAYAN." — JOSÉ RIZAL',
            '"DO NOT TOUCH MY COUNTRYMAN." — ROBIN PADILLA',
            '"I DO NOT CARE ABOUT HUMAN RIGHTS, I CARE ABOUT HUMAN LIVES." — RODRIGO DUTERTE',

            '"EXISTENCE PRECEDES ESSENCE." — JEAN-PAUL SARTRE',
            '"HELL IS OTHER PEOPLE." — JEAN-PAUL SARTRE',
            '"MAN IS CONDEMNED TO BE FREE." — JEAN-PAUL SARTRE',
            '"GOD IS DEAD. GOD REMAINS DEAD. AND WE HAVE KILLED HIM." — FRIEDRICH NIETZSCHE',
            '"HE WHO HAS A WHY TO LIVE CAN BEAR ALMOST ANY HOW." — FRIEDRICH NIETZSCHE',
            '"THE UNEXAMINED LIFE IS NOT WORTH LIVING." — SOCRATES',
            '"ANXIETY IS THE DIZZINESS OF FREEDOM." — SØREN KIERKEGAARD',
            '"NO MAN EVER STEPS IN THE SAME RIVER TWICE." — HERACLITUS',
            '"THE STRUGGLE ITSELF TOWARD THE HEIGHTS IS ENOUGH TO FILL A MAN’S HEART." — ALBERT CAMUS',

            '"IN THE DAY THAT YOU EAT FROM IT YOU WILL CERTAINLY DIE." — GENESIS 2:17',
            '"THE SERPENT DECEIVED ME, AND I ATE." — GENESIS 3:13',
            '"DUST YOU ARE AND TO DUST YOU WILL RETURN." — GENESIS 3:19',
            '"SIN IS CROUCHING AT YOUR DOOR." — GENESIS 4:7',
            '"VANITY OF VANITIES; ALL IS VANITY." — ECCLESIASTES 1:2',
            '"THE WAGES OF SIN IS DEATH." — ROMANS 6:23',
            '"LET THE DEAD BURY THEIR DEAD." — MATTHEW 8:22',
            '"MY GOD, MY GOD, WHY HAVE YOU FORSAKEN ME?" — MATTHEW 27:46'
        ];

        const colors = {
            snake: '#00ff00',
            snakeHead: '#ffff00',
            food: '#ff00ff',
            background: '#1a1a1a',
            grid: '#003300'
        };

        highScoreDisplay.textContent = highScore;

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();

            const width = Math.floor(rect.width / gridSize) * gridSize;
            const height = Math.floor(rect.height / gridSize) * gridSize;

            canvas.width = Math.max(width, 400);
            canvas.height = Math.max(height, 300);

            tileCountX = canvas.width / gridSize;
            tileCountY = canvas.height / gridSize;

            draw();
        }

        window.addEventListener('resize', resizeCanvas);

        function setSFXVolumes() {
            moveSFX.volume = 0.35;
            eatSFX.volume = 0.55;
            gameOverSFX.volume = 0.65;
        }

        setSFXVolumes();

        function playSound(sound) {
            if (!sfxEnabled) return;

            try {
                sound.pause();
                sound.currentTime = 0;

                const playPromise = sound.play();

                if (playPromise !== undefined) {
                    playPromise.catch(() => {});
                }
            } catch (error) {
                console.warn(error);
            }
        }

        function playMoveSound() {
            playSound(moveSFX);
        }

        function playCrunchSound() {
            playSound(eatSFX);
        }

        function playExplosionSound() {
            playSound(gameOverSFX);
        }

        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            const key = e.key.toUpperCase();

            if (!gameStarted && gameRunning) {
                if (
                    key === 'ARROWUP' ||
                    key === 'W' ||
                    key === 'ARROWDOWN' ||
                    key === 'S' ||
                    key === 'ARROWLEFT' ||
                    key === 'A' ||
                    key === 'ARROWRIGHT' ||
                    key === 'D'
                ) {
                    gameStarted = true;
                }
            }

            switch (key) {
                case 'ARROWUP':
                case 'W':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;

                case 'ARROWDOWN':
                case 'S':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;

                case 'ARROWLEFT':
                case 'A':
                    if (direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;

                case 'ARROWRIGHT':
                case 'D':
                    if (direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;

                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        }

        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
            }
        }

        function getRandomQuote() {
            return philosophyQuotes[Math.floor(Math.random() * philosophyQuotes.length)];
        }

        async function startGame() {

            snake = [{
                x: Math.floor(tileCountX / 2),
                y: Math.floor(tileCountY / 2)
            }];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            score = 0;

            gameSpeed = 100;

            generateFood();
            updateDisplay();

            gameRunning = true;
            gamePaused = false;

            gameStarted = false;

            gameOverScreen.classList.remove('active');

            lastMoveTime = Date.now();

            gameLoop();
        }

        async function resetGame() {

            snake = [{
                x: Math.floor(tileCountX / 2),
                y: Math.floor(tileCountY / 2)
            }];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            score = 0;

            gameSpeed = 100;

            gamePaused = false;
            gameRunning = false;
            gameStarted = false;

            generateFood();
            updateDisplay();
            draw();

            gameOverScreen.classList.remove('active');
        }

        function generateFood() {
            let newFood;
            let validPosition = false;

            while (!validPosition) {
                newFood = {
                    x: Math.floor(Math.random() * tileCountX),
                    y: Math.floor(Math.random() * tileCountY)
                };

                validPosition = !snake.some(segment => {
                    return segment.x === newFood.x && segment.y === newFood.y;
                });
            }

            food = newFood;
        }

        function gameLoop() {
            const now = Date.now();
            const deltaTime = now - lastMoveTime;

            if (gameRunning && gameStarted && !gamePaused && deltaTime > gameSpeed) {
                update();
                lastMoveTime = now;
            }

            draw();

            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            direction = nextDirection;

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (
                head.x < 0 ||
                head.x >= tileCountX ||
                head.y < 0 ||
                head.y >= tileCountY
            ) {
                endGame();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            playMoveSound();

            if (head.x === food.x && head.y === food.y) {

                score += 1;

                playCrunchSound();

                gameSpeed = Math.max(35, gameSpeed * 0.90);

                generateFood();

            } else {
                snake.pop();
            }

            updateDisplay();
        }

        function updateDisplay() {
            scoreDisplay.textContent = score;
            highScoreDisplay.textContent = highScore;
        }

        function draw() {

            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= tileCountX; x++) {
                ctx.beginPath();
                ctx.moveTo(x * gridSize, 0);
                ctx.lineTo(x * gridSize, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= tileCountY; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * gridSize);
                ctx.lineTo(canvas.width, y * gridSize);
                ctx.stroke();
            }

            snake.forEach((segment, index) => {

                if (index === 0) {
                    ctx.fillStyle = colors.snakeHead;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = colors.snakeHead;
                } else {
                    ctx.fillStyle = colors.snake;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = colors.snake;
                }

                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            ctx.shadowBlur = 0;

            ctx.fillStyle = colors.food;
            ctx.shadowBlur = 10;
            ctx.shadowColor = colors.food;

            ctx.beginPath();

            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );

            ctx.fill();

            ctx.shadowBlur = 0;

            if (!gameStarted && gameRunning) {

                ctx.fillStyle = 'rgba(0, 255, 255, 0.85)';
                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.fillText(
                    'PRESS ANY ARROW KEY TO BEGIN TEMPTATION',
                    canvas.width / 2,
                    canvas.height / 2
                );
            }

            if (gamePaused) {

                ctx.fillStyle = 'rgba(255, 0, 255, 0.75)';
                ctx.font = 'bold 42px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.fillText(
                    'PAUSED',
                    canvas.width / 2,
                    canvas.height / 2
                );
            }
        }

        function endGame() {

            gameRunning = false;

            playExplosionSound();

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
            }

            updateDisplay();

            document.getElementById('finalScore').textContent = score;
            document.getElementById('philosophyQuote').textContent = getRandomQuote();

            gameOverScreen.classList.add('active');
        }

        resizeCanvas();
        resetGame();

    </script>
</body>
</html>
